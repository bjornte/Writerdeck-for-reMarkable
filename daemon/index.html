<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>rmkbd</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  background: #f5f5f0;
  color: #222;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace;
  -webkit-tap-highlight-color: transparent;
}
#bar {
  position: fixed; top: 0; left: 0; right: 0; height: 40px;
  background: #222; color: #eee;
  display: flex; align-items: center; gap: 10px; padding: 0 14px;
  font-size: 13px;
}
#dot {
  width: 9px; height: 9px; border-radius: 50%;
  background: #666; flex-shrink: 0;
  transition: background 0.2s;
}
#dot.on  { background: #4caf50; }
#dot.off { background: #e53935; }
/* PIN auth screen */
#pin-screen {
  position: fixed; inset: 0; background: #f5f5f0;
  display: flex; align-items: center; justify-content: center;
  z-index: 100;
}
#pin-box {
  background: #222; border-radius: 16px; padding: 32px 28px;
  display: flex; flex-direction: column; align-items: center; gap: 16px;
  width: 320px; max-width: 90vw;
}
#pin-title { color: #ccc; font-size: 15px; text-align: center; line-height: 1.5; }
#pin-input {
  font-size: 32px; letter-spacing: 8px; text-align: center;
  width: 220px; padding: 8px 8px; border: 2px solid #555; border-radius: 8px;
  background: #333; color: #eee; outline: none; -webkit-appearance: none;
}
#pin-input:focus { border-color: #4caf50; }
#pin-btn {
  background: #4caf50; color: #fff; border: none; border-radius: 8px;
  padding: 12px 0; font-size: 16px; cursor: pointer; width: 100%;
  -webkit-tap-highlight-color: transparent;
}
#pin-err { color: #e53935; font-size: 14px; min-height: 20px; text-align: center; }
/* Notes panel */
#notes {
  position: fixed; top: 40px; left: 0; right: 0; bottom: 0;
  overflow-y: auto; -webkit-overflow-scrolling: touch;
  background: #f5f5f0;
}
#notes-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px; border-bottom: 1px solid #e0e0e0;
  background: #f5f5f0; position: sticky; top: 0; z-index: 1;
}
#notes-label { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 0.06em; }
#new-btn, #upload-btn {
  background: #222; color: #eee; border: none; border-radius: 6px;
  padding: 6px 14px; font-size: 14px; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
/* Paste-note modal */
#paste-modal {
  position: fixed; inset: 0; background: rgba(0,0,0,0.5);
  display: none; align-items: center; justify-content: center;
  z-index: 200;
}
#paste-box {
  background: #222; border-radius: 16px; padding: 28px 24px;
  display: flex; flex-direction: column; gap: 12px;
  width: 340px; max-width: 92vw;
}
#paste-title { color: #ccc; font-size: 15px; }
#paste-content {
  font-size: 14px; padding: 8px 10px; border: 2px solid #555;
  border-radius: 8px; background: #333; color: #eee; outline: none;
  -webkit-appearance: none;
  font-family: 'Courier New', monospace; resize: vertical; min-height: 140px;
}
#paste-content:focus { border-color: #4caf50; }
#paste-actions { display: flex; gap: 8px; }
#paste-submit {
  flex: 1; background: #4caf50; color: #fff; border: none;
  border-radius: 8px; padding: 12px 0; font-size: 16px; cursor: pointer;
}
#paste-cancel {
  background: #444; color: #ccc; border: none; border-radius: 8px;
  padding: 12px 16px; font-size: 16px; cursor: pointer;
}
.note-row {
  display: flex; align-items: center; padding: 0 14px; min-height: 52px;
  border-bottom: 1px solid #eee;
}
.note-name {
  flex: 1; font-size: 16px; color: #222; padding: 14px 0; cursor: pointer;
  user-select: none; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.note-name:active { opacity: 0.5; }
.note-btn {
  background: none; border: 1px solid #bbb; border-radius: 5px;
  padding: 5px 10px; font-size: 12px; color: #555; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.note-btn.danger { border-color: #e53935; color: #e53935; }
#notes-empty { padding: 40px 14px; text-align: center; color: #bbb; font-size: 15px; }
/* Preview */
#preview {
  position: fixed; top: 40px; left: 0; right: 0; bottom: 0;
  overflow-y: auto; -webkit-overflow-scrolling: touch;
  background: #f5f5f0; display: none;
}
#preview-head {
  display: flex; align-items: center; gap: 12px; padding: 10px 14px;
  border-bottom: 1px solid #e0e0e0; background: #f5f5f0;
  position: sticky; top: 0;
}
#preview-back {
  background: none; border: none; font-size: 14px; color: #4caf50;
  cursor: pointer; padding: 4px 0;
}
#preview-acts { display: flex; gap: 6px; flex-shrink: 0; }
#preview-title { font-size: 15px; color: #333; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
#preview-body {
  padding: 16px 14px; font-family: 'Courier New', monospace; font-size: 14px;
  line-height: 1.7; white-space: pre-wrap; word-break: break-word; color: #333; margin: 0;
}
/* Typing view: shown while an editor session is active on the tablet */
#typing {
  position: fixed; top: 40px; left: 0; right: 0; bottom: 110px;
  background: #f5f5f0; display: none; overflow-y: auto;
}
#typing-head {
  display: flex; align-items: center; gap: 12px; padding: 10px 14px;
  border-bottom: 1px solid #e0e0e0; background: #f5f5f0;
  position: sticky; top: 0;
}
#typing-back {
  background: none; border: none; font-size: 14px; color: #4caf50;
  cursor: pointer; padding: 4px 0;
}
#typing-note { font-size: 15px; color: #333; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
#typing-body {
  padding: 40px 14px; text-align: center; color: #999; font-size: 15px; line-height: 2.2;
}
#foot {
  position: fixed; bottom: 0; left: 0; right: 0; height: 110px;
  background: #fff; border-top: 1px solid #ddd;
  padding: 8px 14px; display: none;
}
#echo-label {
  font-size: 11px; color: #aaa; margin-bottom: 4px;
  letter-spacing: 0.06em; text-transform: uppercase;
}
#echo {
  font-family: monospace; font-size: 15px; line-height: 1.5;
  white-space: pre-wrap; word-break: break-all;
  color: #333; overflow-y: auto; max-height: 72px;
}
#echo::-webkit-scrollbar { width: 0; height: 0; }
/* Hidden textarea: gives the browser a real input target so hardware
   keyboards work on iOS; disabled attrs prevent iOS autocorrect/caps.
   Positioned off-screen, not display:none, so it can hold focus. */
#trap {
  position: fixed; left: -9999px; top: 0;
  width: 1px; height: 1px; opacity: 0;
}
/* Edit-mode (Type) dark theme: a near-black typing UI to save battery on
   OLED phones while writing. Toggled by body.typing-dark in applyMode();
   Browse mode stays light. */
body.typing-dark #typing,
body.typing-dark #typing-head,
body.typing-dark #foot { background: #000; }
body.typing-dark #typing-head { border-bottom-color: #222; }
body.typing-dark #foot { border-top-color: #222; }
body.typing-dark #typing-note,
body.typing-dark #echo { color: #ddd; }
body.typing-dark #typing .note-btn { color: #ccc; border-color: #555; }
/* Settings gear button in #bar */
#settings-btn {
  margin-left: auto;
  background: transparent; color: #aaa; border: none;
  font-size: 18px; cursor: pointer; padding: 4px 6px;
  -webkit-tap-highlight-color: transparent;
}
#settings-btn:active { color: #fff; }
/* Settings overlay */
#settings-screen {
  position: fixed; inset: 0; background: rgba(0,0,0,0.75);
  display: flex; align-items: center; justify-content: center;
  z-index: 100;
}
#settings-box {
  background: #222; border-radius: 16px; padding: 28px 24px;
  display: flex; flex-direction: column; align-items: stretch; gap: 14px;
  width: 320px; max-width: 90vw;
}
#settings-title { color: #ccc; font-size: 15px; text-align: center; margin-bottom: 4px; }
#settings-list { display: flex; flex-direction: column; gap: 6px; }
.font-row {
  background: #333; border-radius: 8px; padding: 12px 14px;
  display: flex; justify-content: space-between; align-items: center;
  color: #eee; font-size: 15px; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.font-row:active { background: #444; }
.font-row.active { background: #1b4c20; color: #fff; }
.font-row .font-check { color: #4caf50; font-size: 16px; }
#settings-done {
  background: #4caf50; color: #fff; border: none; border-radius: 8px;
  padding: 12px 0; font-size: 16px; cursor: pointer; margin-top: 4px;
  -webkit-tap-highlight-color: transparent;
}
/* Settings section sub-heading */
.settings-section { color: #888; font-size: 12px; margin-top: 10px; padding: 0 2px; letter-spacing: 0.5px; text-transform: uppercase; }
/* Warning label inside a PIN row */
.row-warn { font-size: 11px; color: #e57373; margin-top: 4px; }
/* Allow settings box to scroll on small screens */
#settings-box { overflow-y: auto; max-height: 80vh; }
/* GitHub sync banners and token input */
#sync-banner, #clash-banner {
  margin: 8px 14px; padding: 10px 14px; border-radius: 8px;
  font-size: 13px; line-height: 1.5;
}
#sync-banner  { background: #2a2000; color: #ffcc44; border: 1px solid #554400; }
#clash-banner { background: #2a0000; color: #ff8888; border: 1px solid #550000; }
.token-input {
  flex: 1; font-size: 14px; padding: 8px 10px; border: 2px solid #555;
  border-radius: 8px; background: #333; color: #eee; outline: none;
  -webkit-appearance: none; min-width: 0;
}
.token-input:focus { border-color: #4caf50; }
</style>
</head>
<body>

<div id="bar">
  <div id="dot"></div>
  <span id="msg">connecting...</span>
  <button id="settings-btn" style="display:none" title="Font settings">&#9881;</button>
</div>

<div id="pin-screen">
  <div id="pin-box">
    <p id="pin-title">Enter PIN shown on the reMarkable</p>
    <input id="pin-input" type="text" inputmode="numeric" pattern="[0-9]*"
           maxlength="6" placeholder="000000" autocomplete="off" autocorrect="off">
    <button id="pin-btn">Connect</button>
    <p id="pin-err"></p>
    <button id="lobby-btn" style="margin-top:8px;background:#444;color:#ccc;border:none;border-radius:8px;padding:10px 14px;font-size:14px;cursor:pointer;width:100%;-webkit-tap-highlight-color:transparent">Show PIN on tablet</button>
    <p id="lobby-msg" style="font-size:12px;color:#888;margin:6px 0 0;text-align:center"></p>
  </div>
</div>

<div id="settings-screen" style="display:none">
  <div id="settings-box">
    <p id="settings-title">Settings</p>
    <div id="settings-list"></div>
    <button id="settings-done">Done</button>
  </div>
</div>

<div id="notes">
  <div id="notes-head">
    <span id="notes-label">Notes</span>
    <div style="display:flex;gap:8px">
      <button id="new-btn">New</button>
      <button id="upload-btn">Upload</button>
      <input id="file-input" type="file" accept=".md,.markdown,.txt" style="display:none">
    </div>
  </div>
  <div id="notes-items"></div>
</div>

<div id="paste-modal">
  <div id="paste-box">
    <p id="paste-title">Paste text at the cursor</p>
    <textarea id="paste-content" placeholder="Paste your text here&#10;(long-press &#8594; Paste on iOS)" autocorrect="off" autocapitalize="none" spellcheck="false"></textarea>
    <div id="paste-actions">
      <button id="paste-submit">Insert</button>
      <button id="paste-cancel">Cancel</button>
    </div>
  </div>
</div>

<div id="preview">
  <div id="preview-head">
    <button id="preview-back">&larr; Notes</button>
    <span id="preview-title"></span>
    <div id="preview-acts">
      <button id="preview-edit" class="note-btn">Edit</button>
      <button id="preview-rename" class="note-btn">Rename</button>
      <button id="preview-delete" class="note-btn danger">Delete</button>
      <button id="preview-download" class="note-btn">Download</button>
      <button id="preview-copy" class="note-btn">Copy</button>
    </div>
  </div>
  <pre id="preview-body"></pre>
</div>

<div id="typing">
  <div id="typing-head">
    <button id="typing-back">&larr; Notes</button>
    <span id="typing-note"></span>
    <button id="typing-paste" class="note-btn">Paste from here</button>
  </div>
  <div id="typing-body">
    <p>Type from this screen.</p>
    <p>Your words appear on the tablet.</p>
    <p>Press Home on the tablet when done.</p>
  </div>
</div>

<textarea id="trap"
  autocomplete="off"
  autocorrect="off"
  autocapitalize="none"
  spellcheck="false"></textarea>

<div id="foot">
  <div id="echo-label">Echo</div>
  <div id="echo"></div>
</div>

<script>
(function () {
  'use strict';

  var RETRY_MS = 2000;
  var ECHO_MAX = 300;

  var dot  = document.getElementById('dot');
  var msg  = document.getElementById('msg');
  var echo = document.getElementById('echo');
  var trap = document.getElementById('trap');
  var buf = '';
  var ws;
  // Page mode: false = Browse (file-manager: list/read, no keyboard), true =
  // Type (active editing: keystrokes captured + echo footer shown). Slice 8d's
  // "Edit/launch" flips this to true; Browse is the default companion view.
  var typingMode = false;
  var currentTypingFile = ''; // .md filename of the note currently open in the editor
  // tabletOpenNote: the .md filename the tablet editor actually holds open. Unlike
  // currentTypingFile (which tracks the phone's view and clears on phone-back), this
  // clears only when the tablet truly saves+exits (exitedit), so the post-save GitHub
  // push always targets the right note even after a phone-back.
  var tabletOpenNote = '';
  var previewFilename = '';

  function applyMode() {
    document.getElementById('foot').style.display = typingMode ? 'block' : 'none';
    document.body.classList.toggle('typing-dark', typingMode);
    if (typingMode) { grab(); }
  }

  function setStatus(cls, text) {
    dot.className = cls;
    msg.textContent = text;
  }

  function appendEcho(key) {
    if (key === 'Backspace') {
      buf = buf.slice(0, -1);
    } else if (key === 'Enter') {
      buf += '\n';
    } else if (key === 'Tab') {
      buf += '\t';
    } else if (key === 'Escape') {
      buf += '[Esc]';
    } else if (key.length === 1) {
      buf += key;
    }
    if (buf.length > ECHO_MAX) { buf = buf.slice(-ECHO_MAX); }
    echo.textContent = buf;
    // Keep the latest keystrokes in view -- the box clips its top, not its
    // bottom -- so the echo always reflects what you just typed.
    echo.scrollTop = echo.scrollHeight;
  }

  function send(key, shift, ctrl, alt, meta) {
    if (!ws || ws.readyState !== 1 /* OPEN */) { return; }
    ws.send(JSON.stringify({
      type: 'key', key: key,
      shift: !!shift, ctrl: !!ctrl, alt: !!alt, meta: !!meta
    }));
    appendEcho(key);
  }

  function onKey(e) {
    // Only capture keys in Type mode; in Browse mode let the browser handle them.
    if (!typingMode) { return; }
    // Pass browser-navigation shortcuts through so the page stays manageable
    // (Cmd/Ctrl + R=reload, T=new tab, W=close, N=new window, L=address bar).
    // Everything else -- including Ctrl/Cmd+C/V/X/A/Z/K and modifier+arrows --
    // is captured and forwarded to the tablet.
    var k = e.key.toLowerCase();
    if ((e.ctrlKey || e.metaKey) && (k==='r'||k==='t'||k==='w'||k==='n'||k==='l')) {
      return;
    }
    e.preventDefault();
    send(e.key, e.shiftKey, e.ctrlKey, e.altKey, e.metaKey);
  }

  // overlayUp: true when the PIN screen or the paste modal is showing, so the
  // tablet-capture logic (grab/onKey) must stand down and let the overlay's own
  // inputs receive focus + keystrokes. Without this, opening the paste modal in
  // the typing view would steal focus to the trap and forward keys to the tablet.
  function overlayUp() {
    var ps = document.getElementById('pin-screen');
    if (ps && ps.style.display !== 'none') return true;
    var pm = document.getElementById('paste-modal');
    if (pm && pm.style.display === 'flex') return true;
    var ss = document.getElementById('settings-screen');
    if (ss && ss.style.display !== 'none') return true;
    return false;
  }

  function grab() {
    if (!typingMode) { return; }
    if (overlayUp()) return;
    trap.focus();
  }

  // Primary listener on the trap textarea.
  trap.addEventListener('keydown', onKey);

  // Fallback: catch keydown on the whole document in case focus escapes.
  // Skip entirely while the PIN screen is up so the PIN input can receive typed digits.
  document.addEventListener('keydown', function (e) {
    if (overlayUp()) return;
    if (document.activeElement !== trap) { onKey(e); }
  });

  // Any click/tap on the page re-focuses the trap -- but not while the PIN screen is up.
  document.addEventListener('click', function(e) {
    if (overlayUp()) return;
    grab();
  });

  function connect() {
    var url = 'ws://' + window.location.host + '/ws';
    setStatus('', 'connecting to ' + url + '...');

    ws = new WebSocket(url);

    ws.onopen = function () {
      setStatus('on', 'connected -- ' + window.location.host);
      grab();
      loadNotes();
    };

    ws.onclose = function () {
      setStatus('off', 'disconnected -- retry in ' + (RETRY_MS / 1000) + 's');
      setTimeout(connect, RETRY_MS);
    };

    ws.onerror = function () {
      // onclose fires after onerror; nothing extra needed.
    };

    ws.onmessage = function (event) {
      try {
        var data = JSON.parse(event.data);
        if (data.type === 'exitedit') {
          // Tablet left the edit view (Home pressed or open note deleted). Home
          // SAVES the .md before broadcasting this, so now -- not phone-back -- is
          // the correct moment to push. (On delete the push 404s harmlessly; the
          // GitHub delete is handled in deleteNote.)
          var saved = tabletOpenNote;
          tabletOpenNote = '';
          if (typingMode) { hideTypingView(); }
          if (saved) { pushNote(saved); }
        }
        // Unknown types are silently ignored -- forward-compatible.
      } catch (e) {}
    };
  }

  // ---- Notes API ----

  function loadNotes() {
    fetch('/api/notes')
      .then(function(r) {
        if (r.status === 401) { showPinScreen(); return null; }
        if (!r.ok) throw new Error('server error');
        return r.json();
      })
      .then(function(notes) {
        if (notes !== null) { renderNotes(notes); updateSyncBannerFromState(); }
      })
      .catch(function(err) { console.error('loadNotes failed:', err); });
  }

  function renderNotes(notes) {
    var el = document.getElementById('notes-items');
    if (!notes || notes.length === 0) {
      el.innerHTML = '<div id="notes-empty">No notes yet \u2014 tap &quot;New&quot; to create one.</div>';
      return;
    }
    el.innerHTML = '';
    notes.forEach(function(note) {
      var displayName = note.name.replace(/\.md$/, '');
      var row = document.createElement('div');
      row.className = 'note-row';

      var nameEl = document.createElement('span');
      nameEl.className = 'note-name';
      nameEl.textContent = displayName;
      nameEl.title = note.name;
      nameEl.addEventListener('click', function(e) {
        e.stopPropagation();
        showPreview(note.name, displayName);
      });

      row.appendChild(nameEl);
      el.appendChild(row);
    });
  }

  function showList(e) {
    if (e) e.stopPropagation();
    document.getElementById('preview').style.display = 'none';
    document.getElementById('typing').style.display = 'none';
    document.getElementById('notes').style.display = '';
  }

  // showTypingView: hide everything else, show the "typing on the tablet" panel.
  // noteName is the display name (without .md) shown in the header.
  function showTypingView(noteName, filename) {
    document.getElementById('notes').style.display = 'none';
    document.getElementById('preview').style.display = 'none';
    document.getElementById('typing-note').textContent = noteName;
    document.getElementById('typing').style.display = 'block';
    currentTypingFile = filename || '';
    tabletOpenNote = filename || '';
    typingMode = true;
    applyMode();
  }

  // hideTypingView: leave the editor session running on the tablet, just
  // return the phone to Browse (note list). The session continues; the user
  // can re-enter it by tapping Edit on any note.
  function hideTypingView(e) {
    if (e) e.stopPropagation();
    // Phone-back only: the tablet keeps editing and has NOT saved, so we must not
    // push here (that would ship a stale file and poison the stored SHA). The push
    // happens on the tablet's post-save `exitedit` instead.
    currentTypingFile = '';
    typingMode = false;
    applyMode();
    document.getElementById('typing').style.display = 'none';
    document.getElementById('notes').style.display = '';
    loadNotes();
  }

  // openNote: POST /api/open to tell the tablet to save the current note and
  // open the chosen one; then switch the phone to the typing view.
  function openNote(filename, displayName) {
    // The tablet's /api/open does saveAndLoad: it SAVES the currently-open note
    // before loading the new one. Capture it so we can push that saved note.
    var prev = tabletOpenNote;
    function doOpen() {
      fetch('/api/open', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: filename })
      }).then(function(r) {
        if (r.status === 501) { alert('Not in supervisor mode.'); return; }
        if (!r.ok) { alert('Could not open note (' + r.status + ').'); return; }
        showTypingView(displayName || filename.replace(/\.md$/, ''), filename);
        // The note-switch just saved `prev` on the tablet -- push it to GitHub.
        if (prev && prev !== filename) { pushNote(prev); }
      }).catch(function() { alert('Could not reach server.'); });
    }
    // Skip the pre-open pull when the note is already open on the tablet:
    // keywriter's save-on-load would immediately overwrite the pulled file.
    if (!syncReady() || filename === tabletOpenNote) { doOpen(); return; }
    // Pull newest GitHub version to tablet first (best-effort; open regardless of outcome).
    pullNoteAndUpdate(filename).then(doOpen, doOpen);
  }

  function rewirePreviewButtons(filename, displayName) {
    function rewire(id, fn) {
      var old = document.getElementById(id);
      var fresh = old.cloneNode(true);
      old.parentNode.replaceChild(fresh, old);
      fresh.addEventListener('click', function(e) { e.stopPropagation(); fn(); });
    }
    rewire('preview-edit',   function() { openNote(filename, displayName); });
    rewire('preview-rename', function() { renameNote(filename, displayName); });
    rewire('preview-delete', function() { deleteNote(filename, displayName); });
    rewire('preview-download', function() { downloadNote(filename); });
    rewire('preview-copy',   function() {
      var label = document.getElementById('preview-title').textContent;
      doCopy(document.getElementById('preview-body').textContent, label);
    });
  }

  function showPreview(filename, displayName) {
    previewFilename = filename;
    fetch('/api/notes/' + encodeURIComponent(filename))
      .then(function(r) {
        if (!r.ok) throw new Error('not found');
        return r.text();
      })
      .then(function(text) {
        document.getElementById('preview-title').textContent = displayName;
        document.getElementById('preview-body').textContent = text;
        document.getElementById('notes').style.display = 'none';
        document.getElementById('preview').style.display = 'block';
        rewirePreviewButtons(filename, displayName);
      })
      .catch(function() { alert('Could not load note.'); });
  }

  // downloadNote: navigate the browser to the Content-Disposition:attachment endpoint.
  // The server gates it with the session cookie, which the browser sends automatically
  // on same-origin requests -- no extra auth work needed here.
  function downloadNote(filename) {
    var a = document.createElement('a');
    a.href = '/api/notes/' + encodeURIComponent(filename) + '/download';
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }

  // doCopy: write text to the clipboard, falling back to execCommand on plain-http
  // (navigator.clipboard requires a secure context; the Companion runs on http LAN).
  function doCopy(text, label) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text)
        .then(function() { alert('Copied \u201c' + label + '\u201d to clipboard.'); })
        .catch(function() { fallbackCopy(text, label); });
    } else {
      fallbackCopy(text, label);
    }
  }

  function fallbackCopy(text, label) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    ta.style.top = '0';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    var ok = false;
    try { ok = document.execCommand('copy'); } catch (e) {}
    document.body.removeChild(ta);
    alert(ok
      ? ('Copied \u201c' + label + '\u201d to clipboard.')
      : 'Copy failed \u2014 try long-pressing the text above.');
  }

  function uploadFile(file) {
    if (!file) return;
    if (!/\.(md|markdown|txt)$/i.test(file.name)) {
      alert('Only .md, .markdown, or .txt files can be uploaded.');
      return;
    }
    if (file.size > 1024 * 1024) {
      alert('File is too large (max 1 MB).');
      return;
    }
    var reader = new FileReader();
    reader.onload = function () {
      var base = file.name.replace(/\.(md|markdown|txt)$/i, '');
      fetch('/api/notes', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: base, content: reader.result })
      }).then(function(r) {
        if (r.status === 409) {
          var alt = prompt('"' + base + '" already exists. Save as:', base + '-2');
          if (!alt || !alt.trim()) return;
          var altBase = alt.trim().replace(/\.(md|markdown|txt)$/i, '');
          fetch('/api/notes', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: altBase, content: reader.result })
          }).then(function(r2) {
            if (!r2.ok) { alert('Could not upload note.'); return; }
            var fn = altBase.endsWith('.md') ? altBase : altBase + '.md';
            openNote(fn, altBase.replace(/\.md$/, ''));
          });
          return;
        }
        if (!r.ok) { alert('Could not upload note.'); return; }
        var fn = base.endsWith('.md') ? base : base + '.md';
        openNote(fn, base.replace(/\.md$/, ''));
      }).catch(function() { alert('Could not reach server.'); });
    };
    reader.readAsText(file);
  }

  function createNote(e) {
    e.stopPropagation();
    var name = prompt('New note name:');
    if (!name || !name.trim()) return;
    fetch('/api/notes', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: name.trim() })
    }).then(function(r) {
      if (r.status === 409) { alert('"' + name.trim() + '" already exists.'); return; }
      if (!r.ok) { alert('Could not create note.'); return; }
      // Open the new note immediately so the user lands in editing, not
      // back in the (possibly empty) list. This also replaces the old
      // Write-button entry path for an empty library.
      var filename = name.trim().endsWith('.md') ? name.trim() : name.trim() + '.md';
      openNote(filename, name.trim().replace(/\.md$/, ''));
    });
  }

  function renameNote(filename, displayName) {
    var newName = prompt('Rename "' + displayName + '" to:', displayName);
    if (!newName || !newName.trim() || newName.trim() === displayName) return;
    fetch('/api/notes/' + encodeURIComponent(filename), {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: newName.trim() })
    }).then(function(r) {
      if (r.status === 409) { alert('"' + newName.trim() + '" already exists.'); return; }
      if (!r.ok) { alert('Could not rename note.'); return; }
      // Update the preview in place: new title + rebind all buttons to the new filename.
      var newFilename = newName.trim().endsWith('.md') ? newName.trim() : newName.trim() + '.md';
      var newDisplayName = newName.trim().replace(/\.md$/, '');
      previewFilename = newFilename;
      document.getElementById('preview-title').textContent = newDisplayName;
      rewirePreviewButtons(newFilename, newDisplayName);
      loadNotes();
      if (tabletOpenNote === filename) { tabletOpenNote = newFilename; }
      // Propagate the rename to GitHub: delete the old path, then push the new one.
      if (syncReady()) { ghDelete(filename).then(function() { pushNote(newFilename); }); }
    });
  }

  function deleteNote(filename, displayName) {
    if (!confirm('Delete "' + displayName + '"? This cannot be undone.')) return;
    fetch('/api/notes/' + encodeURIComponent(filename), { method: 'DELETE' })
      .then(function(r) {
        if (!r.ok) { alert('Could not delete note.'); return; }
        if (tabletOpenNote === filename) { tabletOpenNote = ''; }
        ghDelete(filename); // propagate to GitHub so it doesn't resurrect on next pull
        showList();
        loadNotes();
      });
  }

  // ---- Paste-note modal ----

  // The paste modal inserts clipboard text into the note open in the editor, at
  // the cursor, via the existing keystroke pipeline (typeText) -- no new note,
  // no new protocol.
  function showPasteModal() {
    var contentEl = document.getElementById('paste-content');
    contentEl.value = '';
    document.getElementById('paste-modal').style.display = 'flex';
    // Try to pre-fill from clipboard; may prompt the user on iOS Safari.
    if (navigator.clipboard && navigator.clipboard.readText) {
      navigator.clipboard.readText()
        .then(function(text) {
          if (text) { contentEl.value = text; }
        })
        .catch(function() {}); // ignore -- user can long-press Paste manually
    }
    contentEl.focus();
  }

  function hidePasteModal() {
    document.getElementById('paste-modal').style.display = 'none';
  }

  // typeText: replay a string into the editor as key events, so it lands at the
  // current cursor in keywriter -- no new protocol, just the existing keystroke
  // path. Iterates by code point (Array.from) so emoji/astral chars stay intact.
  function typeText(text) {
    text = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
    Array.from(text).forEach(function(ch) {
      if (ch === '\n') { send('Enter'); }
      else if (ch === '\t') { send('Tab'); }
      else { send(ch); }
    });
  }

  function submitPaste() {
    var content = document.getElementById('paste-content').value;
    if (!content) { alert('Nothing to insert \u2014 paste some text first.'); return; }
    hidePasteModal();
    typeText(content);
    grab(); // restore trap focus so manual typing continues
  }

  // ---- Auth ----

  // --- Settings panel (font + PIN picker) ---
  var currentFont = '';
  var settingsFonts = [];
  var currentPinDigits = '6';
  var syncOn = false;  // mirrors /api/settings syncOn
  var syncRepo = '';   // mirrors /api/settings syncRepo

  // Auto-advance poll: while the PIN screen is up, poll GET /api/notes every
  // ~3 s. On 200 (owner switched to no-PIN, or PIN accepted from another
  // client) auto-advance to the notes view.
  var pinPollTimer = null;
  function startPinPoll() {
    if (pinPollTimer) return;
    pinPollTimer = setInterval(function() {
      fetch('/api/notes')
        .then(function(r) {
          if (r.ok) {
            stopPinPoll();
            hidePinScreen();
            connect();
            return r.json();
          }
        })
        .then(function(notes) { if (notes) renderNotes(notes); })
        .catch(function() {});
    }, 3000);
  }
  function stopPinPoll() {
    if (pinPollTimer) { clearInterval(pinPollTimer); pinPollTimer = null; }
  }

  function applyPinDigits(d) {
    currentPinDigits = d;
    renderSettingsList(); // immediate UI feedback
    fetch('/api/settings', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({pinDigits: d})
    }).catch(function() {});
  }

  function showSettings() {
    document.getElementById('settings-screen').style.display = 'flex';
    loadSettingsPanel();
  }

  function hideSettings() {
    document.getElementById('settings-screen').style.display = 'none';
    grab();
  }

  function loadSettingsPanel() {
    fetch('/api/settings')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        currentFont = data.readFont;
        settingsFonts = data.fonts;
        currentPinDigits = data.pinDigits || '6';
        syncOn = !!data.syncOn;
        syncRepo = data.syncRepo || '';
        renderSettingsList();
      })
      .catch(function() {});
  }

  function renderSettingsList() {
    var list = document.getElementById('settings-list');
    list.innerHTML = '';

    // ---- Font section ----
    var fh = document.createElement('div');
    fh.className = 'settings-section';
    fh.textContent = 'Reading font';
    list.appendChild(fh);
    settingsFonts.forEach(function(f) {
      var row = document.createElement('div');
      row.className = 'font-row' + (f.id === currentFont ? ' active' : '');
      var check = f.id === currentFont ? '<span class="font-check">&#10003;</span>' : '';
      row.innerHTML = '<span>' + f.label + '</span>' + check;
      row.addEventListener('click', function(e) {
        e.stopPropagation();
        applyFont(f.id);
      });
      list.appendChild(row);
    });

    // ---- PIN section ----
    var ph = document.createElement('div');
    ph.className = 'settings-section';
    ph.textContent = 'PIN length';
    list.appendChild(ph);
    var pinOpts = [
      {id: '6', label: '6 digits'},
      {id: '4', label: '4 digits'},
      {id: 'none', label: 'No PIN', warn: 'Anyone on your Wi-Fi can read & edit your notes'}
    ];
    // Sync pin-input maxlength/placeholder with the active PIN length.
    var pinInput = document.getElementById('pin-input');
    if (pinInput) {
      if (currentPinDigits === '4') {
        pinInput.maxLength = 4; pinInput.placeholder = '0000';
      } else {
        pinInput.maxLength = 6; pinInput.placeholder = '000000';
      }
    }
    pinOpts.forEach(function(opt) {
      var row = document.createElement('div');
      row.className = 'font-row' + (opt.id === currentPinDigits ? ' active' : '');
      var inner = '<div><div>' + opt.label + '</div>';
      if (opt.warn) {
        inner += '<div class="row-warn">' + opt.warn + '</div>';
      }
      inner += '</div>';
      if (opt.id === currentPinDigits) { inner += '<span class="font-check">&#10003;</span>'; }
      row.innerHTML = inner;
      row.addEventListener('click', function(e) {
        e.stopPropagation();
        applyPinDigits(opt.id);
      });
      list.appendChild(row);
    });

    // ---- GitHub sync section ----
    var syncHead = document.createElement('div');
    syncHead.className = 'settings-section';
    syncHead.textContent = 'GitHub sync';
    list.appendChild(syncHead);

    var syncToggle = document.createElement('div');
    syncToggle.className = 'font-row' + (syncOn ? ' active' : '');
    syncToggle.innerHTML = '<span>Sync notes to GitHub</span>' +
      (syncOn ? '<span class="font-check">&#10003;</span>' : '');
    syncToggle.addEventListener('click', function(e) {
      e.stopPropagation();
      var newVal = !syncOn;
      fetch('/api/settings', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ syncOn: newVal })
      }).then(function(r) {
        if (r.ok) { syncOn = newVal; renderSettingsList(); updateSyncBannerFromState(); }
      }).catch(function(){});
    });
    list.appendChild(syncToggle);

    if (syncOn) {
      var repoLabel = document.createElement('div');
      repoLabel.style.cssText = 'color:#888;font-size:12px;margin-top:6px;padding:0 2px;';
      repoLabel.textContent = 'Private repo (owner/repo)';
      list.appendChild(repoLabel);

      var repoRow = document.createElement('div');
      repoRow.style.cssText = 'display:flex;gap:6px;align-items:center;';
      var repoInput = document.createElement('input');
      repoInput.type = 'text'; repoInput.className = 'token-input';
      repoInput.placeholder = 'e.g. alice/my-notes'; repoInput.value = syncRepo;
      var repoSave = document.createElement('button');
      repoSave.className = 'note-btn'; repoSave.textContent = 'Save';
      repoSave.style.flexShrink = '0';
      repoSave.addEventListener('click', function(e) {
        e.stopPropagation();
        var val = repoInput.value.trim();
        fetch('/api/settings', {
          method: 'POST', headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ syncRepo: val })
        }).then(function(r) {
          if (!r.ok) { alert('Invalid repo \u2014 use owner/repo format.'); return; }
          syncRepo = val;
          repoInput.style.borderColor = '#4caf50';
          setTimeout(function() { repoInput.style.borderColor = ''; }, 1500);
        }).catch(function(){});
      });
      repoRow.appendChild(repoInput); repoRow.appendChild(repoSave);
      list.appendChild(repoRow);

      var tokLabel = document.createElement('div');
      tokLabel.style.cssText = 'color:#888;font-size:12px;margin-top:6px;padding:0 2px;';
      tokLabel.textContent = 'GitHub token (stays on this device \u2014 never sent to the tablet)';
      list.appendChild(tokLabel);

      var tokRow = document.createElement('div');
      tokRow.style.cssText = 'display:flex;gap:6px;align-items:center;flex-wrap:wrap;';
      var tokInput = document.createElement('input');
      tokInput.type = 'password'; tokInput.className = 'token-input';
      tokInput.placeholder = 'ghp_\u2026'; tokInput.autocomplete = 'off';
      if (ghToken()) tokInput.value = '\u2022'.repeat(16);
      var tokTouched = false;
      tokInput.addEventListener('focus', function() {
        if (!tokTouched) { tokInput.value = ''; tokTouched = true; }
      });
      var tokSave = document.createElement('button');
      tokSave.className = 'note-btn'; tokSave.textContent = 'Save';
      tokSave.style.flexShrink = '0';
      tokSave.addEventListener('click', function(e) {
        e.stopPropagation();
        var val = tokInput.value.trim();
        if (!val) return;
        localStorage.setItem('ghToken', val);
        tokInput.value = '\u2022'.repeat(16); tokTouched = false;
        tokInput.style.borderColor = '#4caf50';
        setTimeout(function() { tokInput.style.borderColor = ''; }, 1500);
        updateSyncBannerFromState();
      });
      var tokClear = document.createElement('button');
      tokClear.className = 'note-btn danger'; tokClear.textContent = 'Clear';
      tokClear.style.flexShrink = '0';
      tokClear.addEventListener('click', function(e) {
        e.stopPropagation();
        if (!confirm('Remove GitHub token from this device?')) return;
        localStorage.removeItem('ghToken');
        var keys = [];
        for (var i = 0; i < localStorage.length; i++) {
          var k = localStorage.key(i);
          if (k && (k.startsWith('ghSha_') || k.startsWith('ghPushFailed_'))) keys.push(k);
        }
        keys.forEach(function(k) { localStorage.removeItem(k); });
        tokInput.value = ''; tokTouched = true;
        updateSyncBannerFromState();
      });
      tokRow.appendChild(tokInput); tokRow.appendChild(tokSave); tokRow.appendChild(tokClear);
      list.appendChild(tokRow);

      var statusLine = document.createElement('div');
      statusLine.className = 'sync-status-line';
      statusLine.style.cssText = 'font-size:12px;color:#888;padding:4px 2px;';
      var ls = localStorage.getItem('ghLastSync');
      statusLine.textContent = ls ? 'Last synced: ' + ls : 'Never synced on this device';
      list.appendChild(statusLine);
    }
  }

  function applyFont(id) {
    currentFont = id;
    renderSettingsList(); // immediate UI feedback
    fetch('/api/settings', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({readFont: id})
    }).catch(function() {}); // Go pushes setfont to the editor automatically
  }

  function showPinScreen() {
    document.getElementById('pin-screen').style.display = 'flex';
    startPinPoll();
  }

  function hidePinScreen() {
    stopPinPoll();
    document.getElementById('pin-screen').style.display = 'none';
    document.getElementById('settings-btn').style.display = 'block';
  }

  function checkAuthAndInit() {
    fetch('/api/notes')
      .then(function(r) {
        if (r.status === 401) { showPinScreen(); return null; }
        if (!r.ok) throw new Error('server error');
        return r.json();
      })
      .then(function(notes) {
        if (notes === null) return;
        hidePinScreen();
        connect();
        grab();
        renderNotes(notes);
      })
      .catch(function() { setTimeout(checkAuthAndInit, 2000); });
  }

  function submitPIN(e) {
    if (e) e.stopPropagation();
    var pin = document.getElementById('pin-input').value.trim();
    var errEl = document.getElementById('pin-err');
    errEl.textContent = '';
    if (!pin) return;
    fetch('/api/pin', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pin: pin })
    }).then(function(r) {
      if (r.status === 429) {
        errEl.textContent = 'Too many attempts. Wait a minute, then try again.';
        document.getElementById('pin-input').value = '';
        return;
      }
      if (r.status === 401) {
        errEl.textContent = 'Wrong PIN, try again.';
        document.getElementById('pin-input').value = '';
        document.getElementById('pin-input').focus();
        return;
      }
      if (!r.ok) { errEl.textContent = 'Server error.'; return; }
      hidePinScreen();
      connect();
      grab();
      loadNotes();
    }).catch(function() { errEl.textContent = 'Could not reach server.'; });
  }

  // ---- GitHub sync engine ----

  function ghToken() { return localStorage.getItem('ghToken') || ''; }
  function syncReady() { return syncOn && !!ghToken() && !!syncRepo; }

  // UTF-8-safe base64 encode/decode (btoa/atob are ASCII-only without this wrapper).
  function b64encode(str) { return btoa(unescape(encodeURIComponent(str))); }
  function b64decode(str) { return decodeURIComponent(escape(atob(str.replace(/\s/g, '')))); }

  function ghUrl(filename) {
    return 'https://api.github.com/repos/' + syncRepo + '/contents/' + encodeURIComponent(filename);
  }
  function ghHdrs() {
    return {
      'Authorization': 'Bearer ' + ghToken(),
      'Accept': 'application/vnd.github.v3+json',
      'Content-Type': 'application/json'
    };
  }

  function updateSyncBannerFromState() {
    var el = document.getElementById('sync-banner');
    if (!el) return;
    if (syncOn && !ghToken()) {
      el.innerHTML = '\u26a0 GitHub sync is on \u2014 add your token in <strong>\u2699 Settings</strong>.';
      el.style.display = 'block';
    } else {
      el.style.display = 'none';
    }
  }

  function showClashBanner(noteName, copyName) {
    var el = document.getElementById('clash-banner');
    if (!el) return;
    el.innerHTML = '<strong>Sync clash:</strong> \u201c' + noteName + '\u201d was also edited on GitHub. ' +
      'Your tablet version is now in \u201c' + copyName + '\u201d; ' +
      '\u201c' + noteName + '\u201d now holds the GitHub version. Review both, delete the one you don\u2019t want.';
    el.style.display = 'block';
    setTimeout(function() { el.style.display = 'none'; }, 30000);
  }

  // handleClash: on a 409/422 push clash —
  //   1. save current tablet content as "{name} (tablet copy).md"
  //   2. fetch GitHub version, write it to "{name}.md" on the tablet
  //   3. update stored SHA; show clash banner.
  function handleClash(filename, tabletContent) {
    var copyBase = filename.replace(/\.md$/, '') + ' (tablet copy)';
    var createCopy = fetch('/api/notes', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: copyBase, content: tabletContent })
    }).catch(function() {});
    var fetchGh = fetch(ghUrl(filename), { headers: ghHdrs() })
      .then(function(r) { return r.ok ? r.json() : null; })
      .catch(function() { return null; });
    return Promise.all([createCopy, fetchGh]).then(function(results) {
      var ghData = results[1];
      if (!ghData) return;
      var ghContent = b64decode(ghData.content);
      return fetch('/api/notes/' + encodeURIComponent(filename), {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content: ghContent })
      }).then(function(r) {
        if (r.ok) localStorage.setItem('ghSha_' + filename, ghData.sha);
        localStorage.removeItem('ghPushFailed_' + filename);
        showClashBanner(filename.replace(/\.md$/, ''), copyBase);
        loadNotes();
      });
    }).catch(function() {});
  }

  // pushNote: read note from tablet and push to GitHub; handle clash and auth errors.
  function pushNote(filename) {
    if (!syncReady()) return;
    fetch('/api/notes/' + encodeURIComponent(filename))
      .then(function(r) { return r.ok ? r.text() : null; })
      .then(function(content) {
        if (content === null) return;
        var sha = localStorage.getItem('ghSha_' + filename) || null;
        var body = { message: 'Writerdeck: ' + filename, content: b64encode(content) };
        if (sha) body.sha = sha;
        return fetch(ghUrl(filename), {
          method: 'PUT', headers: ghHdrs(), body: JSON.stringify(body)
        }).then(function(r) {
          if (r.ok) {
            return r.json().then(function(d) {
              localStorage.setItem('ghSha_' + filename, d.content.sha);
              localStorage.removeItem('ghPushFailed_' + filename);
              var ts = new Date().toLocaleString();
              localStorage.setItem('ghLastSync', ts);
              var els = document.querySelectorAll('.sync-status-line');
              for (var i = 0; i < els.length; i++) els[i].textContent = 'Last synced: ' + ts;
            });
          }
          if (r.status === 409 || r.status === 422) { return handleClash(filename, content); }
          if (r.status === 401 || r.status === 403) {
            localStorage.setItem('ghPushFailed_' + filename, '1');
            var banner = document.getElementById('sync-banner');
            if (banner) {
              banner.innerHTML = '\u26a0 GitHub token rejected \u2014 renew it in <strong>\u2699 Settings</strong>.';
              banner.style.display = 'block';
            }
          } else {
            localStorage.setItem('ghPushFailed_' + filename, '1');
          }
        });
      }).catch(function() { localStorage.setItem('ghPushFailed_' + filename, '1'); });
  }

  // pullNoteAndUpdate: check GitHub for a newer version and write it to the tablet.
  // If SHA matches stored SHA, nothing is fetched. Returns a promise.
  function pullNoteAndUpdate(filename) {
    if (!syncReady()) return Promise.resolve();
    return fetch(ghUrl(filename), { headers: ghHdrs() })
      .then(function(r) {
        if (r.status === 404) return null; // not on GitHub yet
        if (r.status === 401 || r.status === 403) {
          var banner = document.getElementById('sync-banner');
          if (banner) {
            banner.innerHTML = '\u26a0 GitHub token rejected \u2014 renew it in <strong>\u2699 Settings</strong>.';
            banner.style.display = 'block';
          }
          return null;
        }
        return r.ok ? r.json() : null;
      })
      .then(function(data) {
        if (!data) return;
        if (localStorage.getItem('ghSha_' + filename) === data.sha) return; // already up to date
        var ghContent = b64decode(data.content);
        return fetch('/api/notes/' + encodeURIComponent(filename), {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ content: ghContent })
        }).then(function(r) {
          if (r.ok) localStorage.setItem('ghSha_' + filename, data.sha);
        });
      })
      .catch(function() {});
  }

  // ghDelete: remove a note from GitHub via the Contents API (needs the file's
  // current sha, tracked per note). No-op if the note was never synced from here.
  function ghDelete(filename) {
    if (!syncReady()) return Promise.resolve();
    var sha = localStorage.getItem('ghSha_' + filename);
    if (!sha) return Promise.resolve();
    return fetch(ghUrl(filename), {
      method: 'DELETE', headers: ghHdrs(),
      body: JSON.stringify({ message: 'Writerdeck: delete ' + filename, sha: sha })
    }).then(function() {
      localStorage.removeItem('ghSha_' + filename);
      localStorage.removeItem('ghPushFailed_' + filename);
    }).catch(function() {});
  }

  window.addEventListener('load', function () {
    document.getElementById('new-btn').addEventListener('click', createNote);
    document.getElementById('upload-btn').addEventListener('click', function(e) {
      e.stopPropagation();
      var fi = document.getElementById('file-input');
      fi.value = '';
      fi.click();
    });
    document.getElementById('file-input').addEventListener('change', function() {
      uploadFile(this.files[0]);
      this.value = '';
    });
    document.getElementById('typing-paste').addEventListener('click', function(e) {
      e.stopPropagation(); showPasteModal();
    });
    // Clipboard-source label: "from here" is always correct (whatever device you
    // hold). Upgrade to "from phone" only on a high-confidence phone UA (iPhone/
    // iPod, or Android + "Mobile"). iPad is excluded on purpose: since iPadOS 13 it
    // reports as desktop Safari, so it stays the safe "from here".
    if (/iPhone|iPod/.test(navigator.userAgent) ||
        (/Android/.test(navigator.userAgent) && /Mobile/.test(navigator.userAgent))) {
      document.getElementById('typing-paste').textContent = 'Paste from phone';
    }
    document.getElementById('paste-submit').addEventListener('click', function(e) {
      e.stopPropagation(); submitPaste();
    });
    document.getElementById('paste-cancel').addEventListener('click', function(e) {
      e.stopPropagation(); hidePasteModal();
    });
    document.getElementById('preview-back').addEventListener('click', showList);
    document.getElementById('typing-back').addEventListener('click', hideTypingView);
    document.getElementById('pin-btn').addEventListener('click', submitPIN);
    document.getElementById('pin-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') { e.stopPropagation(); submitPIN(); }
    });
    document.getElementById('lobby-btn').addEventListener('click', function(e) {
      e.stopPropagation();
      var msgEl = document.getElementById('lobby-msg');
      msgEl.textContent = 'Asking the tablet to show the PIN\u2026';
      fetch('/api/lobby', { method: 'POST' })
        .then(function(r) {
          if (r.status === 429) {
            msgEl.textContent = 'Just a moment, try again shortly.';
            return;
          }
          if (!r.ok) {
            msgEl.textContent = 'Could not reach the tablet.';
            return;
          }
          msgEl.textContent = 'PIN should now appear on the tablet.';
        })
        .catch(function() {
          msgEl.textContent = 'Could not reach the server.';
        });
    });
    document.getElementById('settings-btn').addEventListener('click', function(e) {
      e.stopPropagation(); showSettings();
    });
    document.getElementById('settings-done').addEventListener('click', function(e) {
      e.stopPropagation(); hideSettings();
    });
    applyMode();
    checkAuthAndInit();
  });
}());
</script>
