name: Build keywriter

on:
  workflow_dispatch:    # manual trigger
  push:
    paths:
      - 'third_party/keywriter/Dockerfile'
      - 'third_party/keywriter/build-keywriter.sh'
      - '.github/workflows/build-keywriter.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: docker build -t rm1-writerdeck-keywriter-builder third_party/keywriter/

      - name: Run build container
        run: |
          mkdir -p third_party/keywriter/dist
          docker run --rm \
            -e KEYWRITER_REPO=https://github.com/bjornte/Writerdeck-keywriter.git \
            -e KEYWRITER_REF=master \
            -v "$PWD/third_party/keywriter/dist:/out" \
            rm1-writerdeck-keywriter-builder
          sudo chown -R "$(id -u):$(id -g)" third_party/keywriter/dist

      - name: Compress Qt5 sysroot for git (lean tarball)
        run: |
          cd third_party/keywriter/dist
          if [ -d qt5 ]; then
            echo "Compressing qt5/ -> qt5.tar.gz ..."
            tar -czf qt5.tar.gz qt5/
            rm -rf qt5/
            ls -lh qt5.tar.gz
          else
            echo "WARNING: qt5/ directory not found in dist/ -- sysroot collection may have failed."
            ls -la .
          fi

      - name: Show artifact info
        run: |
          echo "=== Writerdeck binary ==="
          ls -lh third_party/keywriter/dist/Writerdeck
          file third_party/keywriter/dist/Writerdeck

          echo
          echo "=== Qt5 sysroot tarball ==="
          ls -lh third_party/keywriter/dist/qt5.tar.gz 2>/dev/null || echo "  (not present)"

          echo
          find third_party/keywriter/dist -maxdepth 2 | sort

      - name: Upload artifact (for direct download)
        uses: actions/upload-artifact@v4
        with:
          name: keywriter-dist
          path: |
            third_party/keywriter/dist/Writerdeck
            third_party/keywriter/dist/qt5.tar.gz
            third_party/keywriter/dist/README.md
          retention-days: 90

      # Rolling release tag "keywriter" -- curlable without gh.
      # fetch-keywriter-dist.sh prefers these assets; Actions artifact is fallback.
      - name: Publish GitHub Release (main only)
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG=keywriter
          NOTES="CI-built Writerdeck editor + Qt5 sysroot from run ${GITHUB_RUN_ID} ($(date -u +%Y-%m-%d))."
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" \
              third_party/keywriter/dist/Writerdeck \
              third_party/keywriter/dist/qt5.tar.gz \
              --clobber
            gh release edit "$TAG" --notes "$NOTES" --latest
          else
            gh release create "$TAG" \
              third_party/keywriter/dist/Writerdeck \
              third_party/keywriter/dist/qt5.tar.gz \
              --title "Writerdeck editor (latest CI)" \
              --notes "$NOTES" \
              --latest
          fi
          echo "Release: https://github.com/${GITHUB_REPOSITORY}/releases/tag/${TAG}"
