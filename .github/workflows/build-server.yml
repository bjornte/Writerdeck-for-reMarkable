name: Build Writerdeck-server

on:
  workflow_dispatch:
  push:
    paths:
      - 'daemon/**'
      - '.github/workflows/build-server.yml'
      - 'scripts/product-version.sh'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: daemon/go.mod

      - name: Bump product VERSION
        id: ver
        run: |
          set -euo pipefail
          VER="$(bash scripts/product-version.sh --write)"
          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          echo "productVersion=${VER}"

      - name: Cross-build ARMv7 static binary
        working-directory: daemon
        run: |
          set -euo pipefail
          VER="${{ steps.ver.outputs.version }}"
          GOOS=linux GOARCH=arm GOARM=7 CGO_ENABLED=0 \
            go build -trimpath \
              -ldflags "-X main.productVersion=${VER}" \
              -o ../Writerdeck-server .
          file ../Writerdeck-server
          ls -lh ../Writerdeck-server
          echo "productVersion=${VER}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: writerdeck-server
          path: Writerdeck-server
          retention-days: 90

      # Rolling release tag "server" -- curlable without gh.
      - name: Publish GitHub Release (main only)
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG=server
          VER="${{ steps.ver.outputs.version }}"
          NOTES="CI-built Writerdeck-server ${VER} (ARMv7 static) from run ${GITHUB_RUN_ID}."
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" Writerdeck-server --clobber
            gh release edit "$TAG" --notes "$NOTES" --latest=false
          else
            gh release create "$TAG" Writerdeck-server \
              --title "Writerdeck-server (latest CI)" \
              --notes "$NOTES"
          fi
          echo "Release: https://github.com/${GITHUB_REPOSITORY}/releases/tag/${TAG}"

      - name: Publish VERSION on main
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VER="${{ steps.ver.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION
          if git diff --staged --quiet; then
            echo "VERSION already ${VER}"
            exit 0
          fi
          git commit -m "$(printf 'Bump VERSION to %s.\n\n[skip ci]\n' "${VER}")"
          git push
